<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TypeSprint — Typing Test</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
</head>
<body>
  <!-- AUTH MODAL -->
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="authModalClose">✕</button>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="signin">Sign In</button>
        <button class="modal-tab" data-tab="signup">Sign Up</button>
      </div>

      <div id="tabSignin" class="modal-pane active">
        <h2 class="modal-title">Welcome back</h2>
        <p class="modal-sub">Sign in to track your progress</p>
        <div class="modal-field">
          <label>Username</label>
          <input type="text" id="siUsername" placeholder="your username" autocomplete="username" />
        </div>
        <div class="modal-field">
          <label>Password</label>
          <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="siError" class="modal-error hidden"></div>
        <button class="modal-btn" id="siSubmit">Sign In</button>
      </div>

      <div id="tabSignup" class="modal-pane">
        <h2 class="modal-title">Create account</h2>
        <p class="modal-sub">Start tracking your typing journey</p>
        <div class="modal-field">
          <label>Username <span class="hint">3–20 chars</span></label>
          <input type="text" id="suUsername" placeholder="choose a username" autocomplete="username" />
        </div>
        <div class="modal-field">
          <label>Password <span class="hint">min 4 chars</span></label>
          <input type="password" id="suPassword" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div id="suError" class="modal-error hidden"></div>
        <button class="modal-btn" id="suSubmit">Create Account</button>
      </div>
    </div>
  </div>

  <!-- STATS MODAL -->
  <div id="statsModal" class="modal-overlay hidden">
    <div class="modal-box stats-box">
      <button class="modal-close" id="statsModalClose">✕</button>
      <div class="stats-modal-header">
        <h2 class="modal-title">My Statistics</h2>
        <span id="statsUsername" class="stats-user-badge"></span>
      </div>

      <div id="statsContent">
        <div class="stats-loading">Loading your stats…</div>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="header-left">
        <div id="authContainer">
          <div id="loggedOutBtns">
            <button id="signUpBtn">Sign Up</button>
            <button id="signInBtn">Sign In</button>
          </div>
          <div id="loggedInBtns" class="hidden">
            <span id="userBadge" class="user-badge"></span>
            <button id="statsBtn" title="View Statistics">📊 Stats</button>
            <button id="signOutBtn">Sign Out</button>
          </div>
        </div>
        <h1>TypeSprint</h1>
      </div>

      <div class="controls">
        <div class="control-group">
          <div class="options" id="langOptions">
            <button data-lang="en" class="active">EN</button>
            <button data-lang="uz">UZ</button>
          </div>
        </div>
        <div class="control-group">
          <div class="label" data-translate-key="mode">Mode:</div>
          <div class="options" id="modeOptions">
            <button data-mode="time" class="active">time</button>
            <button data-mode="words">words</button>
          </div>
        </div>
        <div class="control-group">
          <div class="label" data-translate-key="count">Count:</div>
          <div class="options" id="valueOptions">
            <button data-value="15">15</button>
            <button data-value="30" class="active">30</button>
            <button data-value="60">60</button>
            <button data-value="120">120</button>
          </div>
        </div>
        <button id="muteBtn" title="Mute/Unmute Sound">🔊</button>
        <button id="restartBtn" title="Restart Test (Esc)" data-translate-title-key="restartTitle">🔄</button>
      </div>
    </header>

    <main>
      <section class="typing-area">
        <div id="wordStream" class="word-stream" tabindex="0">
          <div id="caret" class="caret"></div>
        </div>
        <input id="input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      </section>

      <aside class="stats">
        <div class="stat"> <div class="label" data-translate-key="wpm">WPM</div> <div id="wpm" class="value">0</div> </div>
        <div class="stat"> <div class="label">Raw WPM</div> <div id="rawWpm" class="value">0</div> </div>
        <div class="stat"> <div class="label" data-translate-key="accuracy">Accuracy</div> <div id="accuracy" class="value">0%</div> </div>
        <div class="stat"> <div class="label" data-translate-key="time">Time</div> <div id="time" class="value">00:00</div> </div>
        <div class="stat"> <div class="label" data-translate-key="correct">Correct</div> <div id="correctCount" class="value">0</div> </div>
        <div class="stat"> <div class="label" data-translate-key="typed">Typed</div> <div id="typedCount" class="value">0</div> </div>
        <div class="stat"> <div class="label" data-translate-key="errors">Errors</div> <div id="errors" class="value">0</div> </div>
        <div class="stat"> <div class="label">Consistency</div> <div id="consistency" class="value">—</div> </div>
        <div class="stat"> <div class="label">Progress</div> <div id="progress" class="value">0%</div> </div>
        <div class="links">
          <button id="saveResult" data-translate-key="saveResult">Save Result</button>
        </div>
      </aside>
    </main>

      <div id="keyboard" class="keyboard"></div>
    </div>

    <footer>
      <div id="themeSwitcher" class="theme-switcher">
        <button data-theme="default" title="Default Dark"></button>
        <button data-theme="olivia" title="Olivia"></button>
        <button data-theme="serika" title="Serika Dark"></button>
        <button data-theme="vscode" title="VS Code"></button>
      </div>
      <small data-translate-html="restartFooter">Press <kbd>Esc</kbd> to restart</small>
    </footer>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
